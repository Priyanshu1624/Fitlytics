<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitlytics-Dashboard</title>
    <link rel="stylesheet" href="DashBoard.css">
    <link rel="stylesheet" href="../Shared/layout.css">
</head>
<body>
    
    <div class="dashboard">

        <!--SideBar-->
        <div class="sidebar">

            <h2>Fitlytics</h2>
            <ul>
                <li class="active" id="dashboardbtn">Dashboard</li>
                <li id="mealbtn">Meals</li>
                <li id="workoutsbtn">Workouts</li>
                <li >Progress</li>
                <li id="logoutbtn">Logout</li>
            </ul>
            
        </div>

         <!--Main Content-->
        
        <div class="main">
            <h1>Dashboard</h1>
            <div class="cards">

                <div class="card">
                    <h3>Calories Today</h3>
                    <p id="caloriestoday">1450 kcal</p>
                </div>


                <div class="card">
                    <h3>Calories Burned</h3>
                    <p id="caloriesburned">600 kcal</p>
                </div>


                <div class="card">
                    <h3>Goal Progress</h3>
                    <p>75%</p>
                </div>

            </div>

            <div class="sections">


                <div class="section">
                    <h2>Today's Meals</h2>
                <ul id="mealslist">
                    <li>Rice - 200 kcal</li>
                    <li>Dal - 250 kcal</li>
                </ul>
            
                </div>



                <div class="section">
                    <h2>Today's Workout</h2>
                    <ul id="workoutslist">
                        <li>Running - 300 kcal</li>
                        <li>Bench Press - 350 kcal</li>
                    </ul>
                </div>



            </div>
        </div>
    </div>
    <script src="DashBoard.js"></script>
    <script src="../Shared/navigation.js"></script>
</body>
</html>
